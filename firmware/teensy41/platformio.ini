[platformio]
default_envs = teensy41_full_fusion

[env:teensy41_base]
platform = teensy
board = teensy41
framework = arduino
monitor_speed = 115200
build_flags =
    -O2
    -DENABLE_MIC_ADC=1

[env:teensy41_imu_only]
extends = env:teensy41_base
build_flags =
    ${env:teensy41_base.build_flags}
    -DENABLE_UWB=0
    -DENABLE_ESKF=0
    -DBRINGUP_STAGE=0

[env:teensy41_uwb_detect]
extends = env:teensy41_base
build_flags =
    ${env:teensy41_base.build_flags}
    -DENABLE_UWB=1
    -DENABLE_ESKF=0
    -DBRINGUP_STAGE=1

[env:teensy41_single_range]
extends = env:teensy41_base
build_flags =
    ${env:teensy41_base.build_flags}
    -DENABLE_UWB=1
    -DENABLE_ESKF=0
    -DBRINGUP_STAGE=2

[env:teensy41_full_range]
extends = env:teensy41_base
build_flags =
    ${env:teensy41_base.build_flags}
    -DENABLE_UWB=1
    -DENABLE_ESKF=0
    -DBRINGUP_STAGE=3

[env:teensy41_full_fusion]
extends = env:teensy41_base
build_flags =
    ${env:teensy41_base.build_flags}
    -DENABLE_UWB=1
    -DENABLE_ESKF=1
    -DBRINGUP_STAGE=4
